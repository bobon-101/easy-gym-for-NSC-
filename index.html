<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLife Platform</title>
    <meta name="description" content="A modern fitness workout platform for achieving your goals.">
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        // Production debug helper to catch and display any errors directly on the blank screen
        window.addEventListener('error', function(e) {
            var debugBox = document.getElementById('debug-error-box');
            if (!debugBox) {
                debugBox = document.createElement('div');
                debugBox.id = 'debug-error-box';
                debugBox.style.position = 'fixed';
                debugBox.style.top = '10px';
                debugBox.style.left = '10px';
                debugBox.style.right = '10px';
                debugBox.style.background = '#ef4444';
                debugBox.style.color = 'white';
                debugBox.style.padding = '15px';
                debugBox.style.borderRadius = '8px';
                debugBox.style.zIndex = '999999';
                debugBox.style.fontFamily = 'monospace';
                debugBox.style.whiteSpace = 'pre-wrap';
                debugBox.style.fontSize = '12px';
                debugBox.style.boxShadow = '0 10px 15px -3px rgba(0, 0, 0, 0.5)';
                document.body.appendChild(debugBox);
            }
            debugBox.textContent += '\n[Runtime Error] ' + e.message + ' at ' + e.filename + ':' + e.lineno + ':' + e.colno + '\n' + (e.error ? e.error.stack : '');
        });
        window.addEventListener('unhandledrejection', function(e) {
            var debugBox = document.getElementById('debug-error-box');
            if (!debugBox) {
                debugBox = document.createElement('div');
                debugBox.id = 'debug-error-box';
                debugBox.style.position = 'fixed';
                debugBox.style.top = '10px';
                debugBox.style.left = '10px';
                debugBox.style.right = '10px';
                debugBox.style.background = '#ef4444';
                debugBox.style.color = 'white';
                debugBox.style.padding = '15px';
                debugBox.style.borderRadius = '8px';
                debugBox.style.zIndex = '999999';
                debugBox.style.fontFamily = 'monospace';
                debugBox.style.whiteSpace = 'pre-wrap';
                debugBox.style.fontSize = '12px';
                debugBox.style.boxShadow = '0 10px 15px -3px rgba(0, 0, 0, 0.5)';
                document.body.appendChild(debugBox);
            }
            debugBox.textContent += '\n[Promise Rejection] ' + e.reason + (e.reason && e.reason.stack ? '\n' + e.reason.stack : '');
        });
    </script>
</head>
<body>
    <div id="toast" class="toast"></div>

    <nav id="navbar" class="navbar hidden">
        <div class="nav-container">
            <div class="logo">FitLife</div>
            <ul class="nav-links">
                <li><a href="#" data-route="dashboard">Dashboard</a></li>
                <li><a href="#" data-route="profile">Profile</a></li>
                <li><a href="#" id="logout-btn">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main id="app">
        <!-- Dynamic content will be injected here by app.js -->
    </main>

    <script src="js/data.js"></script>
    <script src="js/pages/auth.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/workout.js"></script>
    <script src="js/pages/profile.js"></script>
    <script src="js/app.js"></script>
    
    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</body>
</html>
